<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>
  <header class="navbar">
    <div class="nav-links">
      <div class="user-profile" (click)="toggleMenu()">
        <div class="profile-circle"></div>
        <span class="user-name">นาย ก.</span>
        <span class="material-symbols-outlined">arrow_drop_down</span>

        <div class="dropdown-menu" *ngIf="isMenuOpen">
          <div class="menu-item" (click)="logout()">
            ออกจากระบบ
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="main-container">
    <div class="dorm-card">
      <div class="card-banner">
        <div class="banner-text">
          <span class="highlight">สำหรับ</span>
          <p>สมาชิกหอพัก</p>
        </div>
        <div class="banner-img">
          <img src="assets/image/preview.png" alt="members">
        </div>
      </div>

      <div class="card-body">
        <div class="info-section">
          <h2 class="dorm-name">รื่นรม (ห้อง 509)</h2>
          <p class="dorm-address">123 หมู่ 12 ต.สายลม อ.ทิวทัศน์ จ.มหาสารคาม</p>
        </div>

        <div class="action-buttons">
          <button class="btn-outline">
            <span class="material-symbols-outlined icon-red">description</span> บิลค่าเช่า
          </button>
          <button class="btn-outline">
            <span class="material-symbols-outlined icon-red">campaign</span> แจ้งเรื่อง
          </button>
        </div>
      </div>

      <div class="card-footer">
        <button class="btn-connect">เชื่อมต่อหอพัก</button>
      </div>
    </div>

  </div>
</body>

</html>
