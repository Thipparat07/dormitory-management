<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>register</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>
    <header class="navbar">
        <div class="nav-links">
            <a routerLink="/register" href="#">
                <span class="material-symbols-outlined icon">person</span>
                สมัครสมาชิก
          </a>
          <a routerLink="/login" href="#">
                    <span class="material-symbols-outlined icon">login</span>
                    เข้าสู่ระบบ
          </a>
        </div>
    </header>

    <main class="container">
        <section class="content-left">
            <div class="logo">
                <img src="assets/image/logo.jpg" alt="Dorm Logo" class="logo-image">
            </div>
            <div class="illustration">
                <img src="assets/image/dorm-illustration.png" alt="Dorm Illustration">
            </div>
        </section>

        <section class="register-card">
            <h2>สมัครสมาชิก</h2>
            <form action="#">
                <div class="input-group">
                    <label for="email">อีเมล</label>
                    <input type="email" id="email" placeholder="" required>
                </div>

                <div class="input-group">
                    <label for="phone">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" placeholder="" required>
                </div>

                <div class="input-group">
                    <label for="password">รหัสผ่าน</label>
                    <input type="password" id="password" placeholder="" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">ยืนยันรหัสผ่าน</label>
                    <input type="password" id="confirm-password" placeholder="" required>
                </div>

                <button type="button" routerLink="" class="btn-role">
                    <span class="material-symbols-outlined">keyboard_arrow_right</span>
                    เจ้าของหอพัก
                </button>

                <button type="submit" class="btn-submit">ลงทะเบียน</button>
                <div class="divider">or</div>

                <button type="button" class="btn-google">
                    <img src="assets/image/Google.png" alt="Google">
                    Google
                </button>
            </form>
        </section>
    </main>
</body>

</html>
