<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>
    <app-header [roomId]="roomId" activeTab="billing"></app-header>
    <div class="main-container">
        <div class="header-box">
            บิลค่าเช่า
        </div>

        <div class="bill-list">
            <div class="bill-card" *ngFor="let bill of bills" (click)="selectBill(bill)">
                <div class="bill-title">{{ bill.title }}</div>
                <div class="bill-status" [ngClass]="bill.status">
                    <span *ngIf="bill.status === 'pending'">!</span>
                    <span *ngIf="bill.status === 'overdue'">×</span>
                    <span *ngIf="bill.status === 'paid'">✓</span>
                    {{ bill.statusText }}
                </div>
            </div>
        </div>
    </div>

</body>

</html>
