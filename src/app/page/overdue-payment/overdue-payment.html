<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <header class="navbar">
        <div class="navbar-content">
            <div class="bill-title">
                ยอดค้างชำระ {{ bill?.total }} บาท
            </div>
            <div class="close-btn" (click)="close()">
                <span class="material-symbols-outlined">
                close
                </span>
                ปิด
            </div>
        </div>
    </header>

    <div class="container">
        <div class="bank-card">
            <div class="card-header">
                เลือกบัญชีธนาคารที่โอนเงิน
            </div>
            <div class="card-body">
                <div class="bank-info">
                    <img src="assets/image/logo_bank.png" alt="KBank" class="bank-logo">
                    <div class="account-details">
                        <div class="account-number">5147896312</div>
                        <div class="account-name">ชื่อบัญชี มนตรี นามมณี</div>
                        <div class="account-branch">ธนาคารกสิกรไทย สาขา มหาสารคาม</div>
                        <button class="select-account-btn" (click)="selectAccount()">เลือกบัญชีนี้</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
