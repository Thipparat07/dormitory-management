<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <header class="navbar">
  <div class="nav-links">
    <a href="#" class="nav-item">สรุปการแจ้ง</a>
    <a href="#" class="nav-item">ผังห้อง</a>
    <a href="#" class="nav-item">บิลค่าเช่า</a>
    <a href="#" class="nav-item">จ่ายบิล</a>
    <a href="#" class="nav-item">จดมิเตอร์</a>
    <div class="nav-item-dropdown" (click)="toggleSettingsMenu()">
      <span>ตั้งค่าหอพัก</span>
      <span class="material-symbols-outlined">arrow_drop_down</span>

      <div class="dropdown-menu" *ngIf="isSettingsMenuOpen">
        <div class="menu-item">บัญชีธนาคาร</div>
        <div class="menu-item">ค่าเช่าห้อง</div>
        <div class="menu-item">ค่าน้ำ - ค่าไฟ</div>
      </div>
    </div>

    <div class="user-profile" (click)="toggleMenu()">
      <div class="profile-circle"></div>
      <span class="user-name">ปีเตอร์</span>
      <span class="material-symbols-outlined">arrow_drop_down</span>

      <div class="dropdown-menu" *ngIf="isMenuOpen">
        <div class="menu-item" (click)="logout()">
          ออกจากระบบ
        </div>
      </div>
    </div>
    <a routerLink="/main" class="home-link">
      <span class="material-symbols-outlined">home</span>
    </a>
  </div>
</header>

<div class="container">
  <div class="content-wrapper">
    <div class="header-box">
      <button class="btn-add" (click)="openAddBankModal()">เพิ่มบัญชี</button>
      <h2>บัญชีธนาคาร</h2>
    </div>
    <div class="content-box">
      <div class="bank-details-wrapper">
        <div class="bank-logo">
           <img src="assets/image/logo_bank.png" alt="Bank Logo">
        </div>
        <div class="bank-info">
          <div class="account-number">5147896312</div>
          <div class="account-name">ชื่อบัญชี มนตรี นามมณี</div>
          <div class="bank-branch">ธนาคารกสิกรไทย สาขา มหาสารคาม</div>
        </div>
      </div>
      <div class="action-footer">
        <button class="btn-edit" (click)="openEditBankModal()">แก้ไข</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="isAddBankModalOpen">
  <div class="modal-container">
    <div class="modal-header">
      <h3>เพิ่มบัญชี</h3>
      <span class="material-symbols-outlined close-btn" (click)="closeAddBankModal()">close</span>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="bankSelect">เลือกบัญชีธนาคาร</label>
        <div class="select-wrapper">
            <select id="bankSelect">
            <option value="" disabled selected hidden></option>
            <option value="kbank">ธนาคารกสิกรไทย</option>
            <option value="scb">ธนาคารไทยพาณิชย์</option>
            </select>
            <span class="material-symbols-outlined select-arrow">expand_more</span>
        </div>
      </div>

      <div class="form-group">
        <label for="branch">สาขา</label>
        <input type="text" id="branch">
      </div>

      <div class="form-group">
        <label for="accName">ชื่อบัญชี</label>
        <input type="text" id="accName">
      </div>

      <div class="form-group">
        <label for="accNumber">เลขบัญชี</label>
        <input type="text" id="accNumber">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" (click)="closeAddBankModal()">ยกเลิก</button>
      <button class="btn-save">บันทึก</button>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="isEditBankModalOpen">
  <div class="modal-container">
    <div class="modal-header">
      <h3>แก้ไขบัญชี</h3>
      <span class="material-symbols-outlined close-btn" (click)="closeEditBankModal()">close</span>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="bankSelect">เลือกบัญชีธนาคาร</label>
        <div class="select-wrapper">
            <select id="bankSelect">
            <option value="" disabled selected hidden></option>
            <option value="kbank">ธนาคารกสิกรไทย</option>
            <option value="scb">ธนาคารไทยพาณิชย์</option>
            </select>
            <span class="material-symbols-outlined select-arrow">expand_more</span>
        </div>
      </div>

      <div class="form-group">
        <label for="branch">สาขา</label>
        <input type="text" id="branch">
      </div>

      <div class="form-group">
        <label for="accName">ชื่อบัญชี</label>
        <input type="text" id="accName">
      </div>

      <div class="form-group">
        <label for="accNumber">เลขบัญชี</label>
        <input type="text" id="accNumber">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" (click)="closeEditBankModal()">ยกเลิก</button>
      <button class="btn-save">บันทึก</button>
    </div>
  </div>
</div>
</body>
