<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <header class="navbar">
      <div class="nav-links">
        <a href="#" class="nav-item active">ข้อมูลหอพัก</a>
        <a href="#" class="nav-item">บิลค่าเช่า</a>
        <a href="#" class="nav-item">แจ้งเรื่อง</a>
        <a href="#" class="nav-item">เปรียบเทียบ</a>

        <div class="user-profile" (click)="toggleMenu()">
          <div class="profile-circle"></div>
          <span class="user-name">นาย ก.</span>
          <span class="material-symbols-outlined">arrow_drop_down</span>

          <div class="dropdown-menu" *ngIf="isMenuOpen">
            <div class="menu-item" (click)="logout()">
              ออกจากระบบ
            </div>
          </div>
        </div>
        <a routerLink="/main" class="home-link">
          <span class="material-symbols-outlined">home</span>
        </a>
      </div>
    </header>

    <div class="main-content">
      <div class="card dorm-card">
        <div class="card-header-image">
           <img src="assets/image/Edit.png" alt="Dorm Header">
        </div>
        <div class="card-body">
          <h2 class="dorm-name">รื่นรม (ห้อง 509)</h2>
          <div class="info-list">
            <div class="info-item">
              <span class="material-symbols-outlined icon">location_on</span>
              <span>123 หมู่ 12 ต.สายลม อ.ทิวทัศน์ จ.มหาสารคาม</span>
            </div>
             <div class="info-item">
              <span class="material-symbols-outlined icon">call</span>
              <span class="highlight-text">028-743-9287</span>
            </div>
             <div class="info-item">
              <span class="material-symbols-outlined icon">mail</span>
              <span class="highlight-text">Ka12@gmail.com</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card bank-card">
        <h3 class="bank-title">บัญชีธนาคารหอพัก</h3>
        <div class="bank-details-container">
          <div class="bank-logo">
            <img src="assets/image/logo_bank.png" alt="Bank Logo">
          </div>
          <div class="bank-info">
            <div class="account-number">5147896312</div>
            <div class="account-name">ชื่อบัญชี มนตรี นามมณี</div>
            <div class="bank-branch">ธนาคารกสิกรไทย สาขา มหาสารคาม</div>
          </div>
        </div>
      </div>
    </div>
</body>
</html>
