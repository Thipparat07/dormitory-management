<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
  <header class="navbar">
    <div class="nav-links">
      <div class="user-profile" (click)="toggleMenu()">
        <div class="profile-circle"></div>
        <span class="user-name">ปีเตอร์</span>
        <span class="material-symbols-outlined">arrow_drop_down</span>

        <div class="dropdown-menu" *ngIf="isMenuOpen">
          <div class="menu-item" (click)="logout()">
            ออกจากระบบ
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="form-wrapper">
      <div class="form-header">
        <h1>ข้อมูลหอพัก</h1>
        <p>โปรดกรอกข้อมูลหอพักของคุณ</p>
      </div>

      <form class="dorm-form">
        <div class="form-group">
          <label for="dormName">ชื่อหอพัก</label>
          <input type="text" id="dormName" placeholder="กรอกชื่อหอพัก">
        </div>

        <div class="form-group">
          <label for="phone">เบอร์โทรติดต่อหอพัก</label>
          <input type="text" id="phone" placeholder="กรอกเบอร์โทร">
        </div>

        <div class="form-row">
          <div class="form-group half-width">
            <label for="billDate">หอพักของคุณทำบิลทุกวันที่เท่าไหร่</label>
            <select id="billDate">
              <option value="" disabled selected hidden></option>
               <option value="1">1</option>
               <option value="25">25</option>
            </select>
            <span class="material-symbols-outlined select-arrow">expand_more</span>
          </div>
          <div class="form-group half-width">
            <label for="dueDate">กำหนดวันที่สิ้นสุดการชำระเงิน</label>
            <select id="dueDate">
              <option value="" disabled selected hidden></option>
              <option value="5">5</option>
              <option value="30">30</option>
            </select>
            <span class="material-symbols-outlined select-arrow">expand_more</span>
          </div>
        </div>

        <div class="form-group">
          <label>รูปแบบการทำบิล</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="billType" value="post-paid">
              <span class="radio-custom"></span>
              จ่ายค่าห้องหลังเข้าอยู่
            </label>
            <label class="radio-option">
              <input type="radio" name="billType" value="pre-paid">
              <span class="radio-custom"></span>
              จ่ายค่าห้องก่อนเข้าอยู่
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="floorCount">กรอกจำนวนชั้น</label>
          <input type="text" id="floorCount">
        </div>

        <div class="form-group">
          <label for="roomCount">จำนวนห้อง (หากไม่มีให้ใส่ 0)</label>
          <input type="text" id="roomCount">
        </div>

        <div class="form-group">
          <label for="address">ที่อยู่หอพัก</label>
          <input type="text" id="address" placeholder="บ้านเลขที่/ หมู่/ ซอย/ ถนน/ ตำบล/ อำเภอ/ จังหวัด/ รหัสไปรษณีย์">
        </div>

        <button type="button" class="btn-save">บันทึก</button>
      </form>
    </div>
  </div>

</body>
</html>
