<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transfer Receipt</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <header class="navbar">
        <div class="navbar-content">
            <div class="bill-title">
                ยอดค้างชำระ {{ bill?.total || '0' }} บาท
            </div>
            <div class="close-btn" (click)="close()">
                <span class="material-symbols-outlined">close</span>
                ปิด
            </div>
        </div>
    </header>

    <div class="container">
      <button class="back-btn" (click)="goBack()">
        <span class="material-symbols-outlined">arrow_back_ios</span>
        กลับ
      </button>

      <div class="content-wrapper">
        <h2 class="upload-title">กรุณาแนบหลักฐานการโอน</h2>

        <input type="file" id="fileInput" (change)="onFileSelected($event)" style="display: none" accept="image/*">

        <button class="upload-btn" (click)="triggerFileInput()">
          แนบหลักฐานการโอน
        </button>

        <div class="image-placeholder" *ngIf="imagePreview">
          <img [src]="imagePreview" alt="Transfer Proof" class="preview-image">
        </div>

        <button class="confirm-btn">
          ยืนยัน
        </button>
      </div>
    </div>
</body>
</html>
