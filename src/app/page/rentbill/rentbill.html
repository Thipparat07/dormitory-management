<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <header class="navbar">
      <div class="nav-links">
        <a href="#" class="nav-item">ข้อมูลหอพัก</a>
        <a href="#" class="nav-item active">บิลค่าเช่า</a>
        <a href="#" class="nav-item">แจ้งเรื่อง</a>
        <a href="#" class="nav-item">เปรียบเทียบ</a>

        <div class="user-profile" (click)="toggleMenu()">
          <div class="profile-circle"></div>
          <span class="user-name">นาย ก.</span>
          <span class="material-symbols-outlined">arrow_drop_down</span>

          <div class="dropdown-menu" *ngIf="isMenuOpen">
            <div class="menu-item" (click)="logout()">
              ออกจากระบบ
            </div>
          </div>
        </div>
        <a routerLink="/main" class="home-link">
          <span class="material-symbols-outlined">home</span>
        </a>
      </div>
    </header>

    <div class="main-container">
      <div class="header-box">
        บิลค่าเช่า
      </div>

      <div class="bill-list">
        <div class="bill-card" *ngFor="let bill of bills" (click)="selectBill(bill)">
          <div class="bill-title">{{ bill.title }}</div>
          <div class="bill-status" [ngClass]="bill.status">
            <span *ngIf="bill.status === 'pending'">!</span>
            <span *ngIf="bill.status === 'overdue'">×</span>
            <span *ngIf="bill.status === 'paid'">✓</span>
            {{ bill.statusText }}
          </div>
        </div>
      </div>
    </div>

</body>
</html>
